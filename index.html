<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1"><title>安卓模拟器 多开 & 配置建议器</title>
<meta name=description content="输入内存/CPU/显卡，按真实经验算出建议多开数与每实例参数。">
<style>body{font-family:system-ui,'Microsoft YaHei',sans-serif;max-width:760px;margin:0 auto;padding:24px;color:#1f2937;line-height:1.7;background:#fafafa}
h1{font-size:1.5rem;color:#16324f}label{display:block;margin:14px 0 4px;font-weight:600}
select,input{width:100%;padding:9px;border:1px solid #cbd5e1;border-radius:8px;font-size:1rem;box-sizing:border-box}
button{margin-top:18px;width:100%;padding:12px;background:#2b6cb0;color:#fff;border:0;border-radius:8px;font-size:1.05rem;cursor:pointer}
#out{margin-top:20px;padding:16px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;display:none}
.rec{font-size:1.15rem;font-weight:700;color:#1a4a73}.row{display:flex;gap:12px}.row>div{flex:1}
.ref{margin-top:16px;font-size:.92rem;color:#475569}.ref a{color:#1a73e8}small{color:#64748b}</style></head><body>
<h1>安卓模拟器 多开 & 配置建议器</h1><p><small>输入内存/CPU/显卡，按真实经验算出建议多开数与每实例参数。</small></p><label>物理内存 (GB)</label><select id=ram><option>8</option><option selected>16</option><option>32</option><option>64</option></select>
<div class=row><div><label>CPU 物理核</label><select id=core><option>4</option><option selected>6</option><option>8</option><option>12</option></select></div>
<div><label>独立显卡</label><select id=gpu><option value=1>有(独显)</option><option value=0>无(核显)</option></select></div></div>
<label>用途</label><select id=use><option value=multi>多开挂机/搬砖</option><option value=single>单开画质(原神/二次元)</option></select>
<button onclick=plan()>生成配置建议</button><div id=out></div>
<div class=ref>展开教程：<a href="https://ldmqn.com/youhua/">雷电卡顿优化全攻略</a> · <a href="https://ldmqn.com/duokai/">多开同步器原理</a> · <a href="https://ldmqn.com/vs-mumu/">雷电 vs MuMu</a></div><script src="app.js"></script></body></html>
